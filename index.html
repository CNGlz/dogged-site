<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ready?</title>
<style>
body {
  margin:0;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  text-align:center;
  font-family:Arial;
}
button{
  padding:15px 30px;
  font-size:20px;
  border-radius:10px;
  border:none;
  background:yellow;
  cursor:pointer;
}
video{
  display:none;
  width:100%;
  height:100vh;
  object-fit:cover;
}
</style>
</head>
<body>

<h1>Ready to get dogged?</h1>
<button onclick="playVid()">Yes</button>

<video id="dogVid" playsinline>
  <source src="wenomechainsama.mp4" type="video/mp4">
</video>

<script>
function playVid(){
  document.querySelector("h1").style.display="none";
  document.querySelector("button").style.display="none";
  const v = document.getElementById("dogVid");
  v.style.display="block";
  v.play();
}
</script>

</body>
</html>
